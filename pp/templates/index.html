<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Stock Prediction Dashboard Pro</title>
    <!-- Chart.js for graphs -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');
        
        :root {
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.5);
            --secondary: #8b5cf6;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }
        
        * { box-sizing: border-box; }
        
        body { 
            font-family: 'Outfit', sans-serif; 
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            background-attachment: fixed;
            margin: 0; 
            padding: 0; 
            color: var(--text-main); 
            min-height: 100vh;
        }
        
        /* Glassmorphism styling */
        .glass {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        
        .header {
            padding: 2rem;
            text-align: center;
            background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.1), transparent);
            border-bottom: 1px solid var(--card-border);
            margin-bottom: 2rem;
        }
        .header h1 { 
            margin: 0; 
            font-size: 2.5rem; 
            font-weight: 700; 
            background: linear-gradient(to right, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        
        .container { 
            max-width: 1100px; 
            margin: 0 auto; 
            padding: 0 1.5rem 2rem 1.5rem; 
        }
        
        .search-container { 
            display: flex; 
            justify-content: center; 
            gap: 16px; 
            margin-bottom: 3rem; 
        }
        input[type="text"] { 
            padding: 14px 20px; 
            width: 350px; 
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--card-border); 
            border-radius: 12px; 
            color: white;
            font-size: 16px; 
            font-family: 'Outfit', sans-serif;
            outline: none;
            transition: all 0.3s ease;
        }
        input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
        }
        button { 
            padding: 14px 28px; 
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }
        button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.6);
        }
        
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .result-card {
            padding: 1.5rem;
            text-align: center;
            transition: transform 0.3s ease;
        }
        .result-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.3);
        }
        
        .result-label {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }
        
        .result-value {
            font-size: 2rem;
            font-weight: 700;
            color: white;
        }
        
        .chart-container { 
            position: relative; 
            height: 450px; 
            width: 100%; 
            padding: 1.5rem;
            margin-top: 2rem; 
        }
        
        .badge {
            display: inline-block;
            padding: 0.4rem 1.2rem;
            border-radius: 20px;
            font-weight: 600;
            font-size: 1rem;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .badge-buy { background: rgba(16, 185, 129, 0.2); color: #34d399; border: 1px solid #10b981; }
        .badge-sell { background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid #ef4444; }
        .badge-hold { background: rgba(245, 158, 11, 0.2); color: #fbbf24; border: 1px solid #f59e0b; }
        
        .loading { 
            display: none; 
            text-align: center; 
            margin: 4rem 0; 
        }
        .spinner {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: var(--primary);
            border-bottom-color: var(--secondary);
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .market-overview {
            margin-top: 4rem;
            padding: 2rem;
        }
        
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        
        .flex-between h2 {
            margin: 0;
            font-weight: 600;
        }
        
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 1rem;
        }
        th, td {
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        th {
            background-color: rgba(15, 23, 42, 0.4);
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }
        tr:hover td {
            background-color: rgba(255, 255, 255, 0.02);
        }
        
        .text-green { color: #34d399; font-weight: 600; }
        .text-red { color: #f87171; font-weight: 600; }
        
        .btn-success {
            background: linear-gradient(135deg, #059669, #10b981);
            padding: 10px 20px;
            font-size: 14px;
        }
        
        .footer {
            text-align: center;
            margin-top: 4rem;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.95rem;
            border-top: 1px solid var(--card-border);
        }
        .footer strong {
            color: #e2e8f0;
            background: linear-gradient(to right, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>AI Stock Prediction Dashboard Pro</h1>
    </div>
    
    <div class="container">
        <!-- Searchable list of famous companies -->
        <datalist id="popularTickers">
            <option value="AAPL">Apple Inc.</option>
            <option value="MSFT">Microsoft Corp.</option>
            <option value="GOOGL">Alphabet Inc.</option>
            <option value="AMZN">Amazon.com Inc.</option>
            <option value="TSLA">Tesla Inc.</option>
            <option value="META">Meta Platforms Inc.</option>
            <option value="NVDA">NVIDIA Corp.</option>
            <option value="RELIANCE.NS">Reliance Industries (India)</option>
            <option value="TCS.NS">Tata Consultancy Services (India)</option>
            <option value="INFY.NS">Infosys (India)</option>
            <option value="HDFCBANK.NS">HDFC Bank (India)</option>
            <option value="SBIN.NS">State Bank of India</option>
            <option value="ITC.NS">ITC Limited (India)</option>
        </datalist>

        <div class="search-container">
            <input type="text" id="stockInput" list="popularTickers" placeholder="Search Stock Symbol (e.g. AAPL, RELIANCE)..." value="AAPL" onkeypress="if(event.key === 'Enter') predictStock()">
            <button onclick="predictStock()">✨ Analyze Stock</button>
        </div>
        
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p style="color: var(--text-muted); font-size: 1.1rem;">Quantum models analyzing historical data... Please wait.</p>
        </div>
        
        <div id="resultContainer" style="display: none;">
            <div class="results-grid" id="predictionText">
                <!-- Populated via JS -->
            </div>
            <div class="chart-container glass">
                <canvas id="stockChart"></canvas>
            </div>
        </div>
        
        <!-- Live Market Overview -->
        <div class="market-overview glass" id="marketOverviewSection">
            <div class="flex-between">
                <h2>Live Market Overview</h2>
                <button class="btn-success" onclick="window.location.href='/download-stocks'">📥 Export CSV</button>
            </div>
            <div style="overflow-x: auto;">
                <table id="marketTable">
                    <thead>
                        <tr>
                            <th>Symbol</th>
                            <th>Current Price</th>
                            <th>Previous Close</th>
                            <th>Day Change</th>
                            <th>Change %</th>
                        </tr>
                    </thead>
                    <tbody id="marketTableBody">
                        <tr><td colspan="5" style="text-align:center; padding: 2rem;">Loading live market feeds...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <div class="footer">
            Project Done By: <strong>Kiran Kumar B S</strong>, <strong>N S shiva kumar</strong>, <strong>Kusuma M N</strong>, <strong>Manoj D</strong>
        </div>
    </div>

    <script>
        // Set Chart.js defaults for dark mode
        Chart.defaults.color = '#94a3b8';
        Chart.defaults.font.family = "'Outfit', sans-serif";
        
        let stockChart = null;

        async function predictStock() {
            const ticker = document.getElementById('stockInput').value.trim().toUpperCase();
            if (!ticker) return alert("Please enter a stock symbol");

            document.getElementById('loading').style.display = 'block';
            document.getElementById('resultContainer').style.display = 'none';

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ticker: ticker })
                });
                
                const data = await response.json();
                document.getElementById('loading').style.display = 'none';
                
                if (data.error) {
                    alert(data.error);
                    return;
                }

                document.getElementById('resultContainer').style.display = 'block';
                
                const lastPrice = data.current_price;
                const predPrice = data.predicted_price;
                const diff = predPrice - lastPrice;
                const percentChange = ((diff / lastPrice) * 100).toFixed(2);
                
                let recommendation = 'HOLD';
                let badgeClass = 'badge-hold';
                if (percentChange > 2) {
                    recommendation = 'BUY';
                    badgeClass = 'badge-buy';
                } else if (percentChange < -2) {
                    recommendation = 'SELL';
                    badgeClass = 'badge-sell';
                }
                
                document.getElementById('predictionText').innerHTML = `
                    <div class="result-card glass">
                        <div class="result-label">Current Price</div>
                        <div class="result-value">₹${lastPrice.toFixed(2)}</div>
                    </div>
                    <div class="result-card glass">
                        <div class="result-label">AI Forecast (30D)</div>
                        <div class="result-value">₹${predPrice.toFixed(2)}</div>
                    </div>
                    <div class="result-card glass">
                        <div class="result-label">Expected Change</div>
                        <div class="result-value" style="color: ${diff >= 0 ? '#34d399' : '#f87171'}">
                            ${diff > 0 ? '+' : ''}₹${diff.toFixed(2)} <br><span style="font-size: 1.2rem">(${diff > 0 ? '+' : ''}${percentChange}%)</span>
                        </div>
                    </div>
                    <div class="result-card glass" style="display: flex; flex-direction: column; justify-content: center; align-items: center;">
                        <div class="result-label">Recommendation</div>
                        <div style="margin-top: 0.5rem;"><span class="badge ${badgeClass}">${recommendation}</span></div>
                    </div>
                `;

                renderChart(data.historical, data.predicted_price);

            } catch (err) {
                document.getElementById('loading').style.display = 'none';
                alert("Failed to fetch prediction. Make sure your inputs are correct.");
                console.error(err);
            }
        }

        function renderChart(historical, predictedPrice) {
            const ctx = document.getElementById('stockChart').getContext('2d');
            
            if (stockChart) {
                stockChart.destroy();
            }

            const dates = historical.dates;
            const prices = historical.prices;
            
            const lastDate = new Date(dates[dates.length - 1]);
            lastDate.setDate(lastDate.getDate() + 30);
            const futureDateStr = lastDate.toISOString().split('T')[0];
            
            const chartDates = [...dates, futureDateStr];
            
            const actualPrices = [...prices, null];
            
            const predictionPrices = Array(dates.length).fill(null);
            predictionPrices[dates.length - 1] = prices[prices.length - 1]; 
            predictionPrices.push(predictedPrice);

            // Create gradient for the line chart
            const gradient = ctx.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, 'rgba(59, 130, 246, 0.5)');
            gradient.addColorStop(1, 'rgba(59, 130, 246, 0.0)');

            stockChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: chartDates,
                    datasets: [
                        {
                            label: 'Historical Price',
                            data: actualPrices,
                            borderColor: '#3b82f6',
                            backgroundColor: gradient,
                            borderWidth: 3,
                            fill: true,
                            pointRadius: 0,
                            pointHoverRadius: 6,
                            pointHoverBackgroundColor: '#60a5fa',
                            tension: 0.1
                        },
                        {
                            label: 'AI Forecast',
                            data: predictionPrices,
                            borderColor: '#c084fc',
                            borderWidth: 3,
                            borderDash: [5, 5],
                            pointBackgroundColor: '#c084fc',
                            pointRadius: [ ...Array(dates.length).fill(0), 6 ],
                            pointHoverRadius: 8
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        tooltip: {
                            backgroundColor: 'rgba(15, 23, 42, 0.9)',
                            titleFont: { size: 14, family: "'Outfit', sans-serif" },
                            bodyFont: { size: 14, family: "'Outfit', sans-serif" },
                            padding: 12,
                            borderColor: 'rgba(255,255,255,0.1)',
                            borderWidth: 1,
                            callbacks: {
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    if (label) {
                                        label += ': ';
                                    }
                                    if (context.parsed.y !== null) {
                                        label += new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR' }).format(context.parsed.y);
                                    }
                                    return label;
                                }
                            }
                        },
                        legend: {
                            labels: {
                                usePointStyle: true,
                                padding: 20
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: { maxTicksLimit: 8 }
                        },
                        y: {
                            grid: { color: 'rgba(255, 255, 255, 0.05)' },
                            ticks: {
                                callback: function(value) {
                                    return '₹' + value;
                                },
                                padding: 10
                            }
                        }
                    }
                }
            });
        }
        
        async function loadMarketOverview() {
            try {
                const response = await fetch('/market-overview');
                const data = await response.json();
                
                const tbody = document.getElementById('marketTableBody');
                tbody.innerHTML = '';
                
                if (data.error) {
                    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:#ef4444;">Failed to load live market data</td></tr>`;
                    return;
                }
                
                data.stocks.forEach(stock => {
                    if (stock.error) return;
                    
                    const diff = stock.current_price - stock.previous_close;
                    const pct = ((diff / stock.previous_close) * 100).toFixed(2);
                    const isUp = diff >= 0;
                    const colorClass = isUp ? 'text-green' : 'text-red';
                    const sign = isUp ? '+' : '';
                    
                    const p1 = stock.current_price.toFixed(2);
                    const p2 = stock.previous_close.toFixed(2);
                    
                    tbody.innerHTML += `
                        <tr>
                            <td style="font-weight: 600; color: #f8fafc;">${stock.ticker}</td>
                            <td>₹${p1}</td>
                            <td>₹${p2}</td>
                            <td class="${colorClass}">${sign}₹${diff.toFixed(2)}</td>
                            <td class="${colorClass}">${sign}${pct}%</td>
                        </tr>
                    `;
                });
            } catch(e) {
                console.error("Market Overview Error:", e);
                document.getElementById('marketTableBody').innerHTML = `<tr><td colspan="5" style="text-align:center;color:#ef4444;">Failed to fetch live market data.</td></tr>`;
            }
        }
        
        // Initial load
        window.addEventListener('load', () => {
            predictStock();
            loadMarketOverview();
        });
    </script>
</body>
</html>
